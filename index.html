  <title>PyrΔmida</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #080c0a; --bg2: #060a07; --border: #1a2e22;
      --green: #3dff7a; --green-mid: #4a7a5a;
      --red: #ff5050; --red-dim: #7a2020;
      --orange: #cc7020; --text: #a8c5b0;
      --muted: #90d4a8;
      --font: 'Courier New', 'Lucida Console', monospace;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100dvh; display: flex; flex-direction: column; overscroll-behavior: none;
    }

    .header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; flex-direction: column; gap: 10px;
      position: sticky; top: 0; z-index: 10;
      padding-top: max(12px, env(safe-area-inset-top));
    }
    .header-row1 { display: flex; justify-content: space-between; align-items: center; }
    .header-row2 { display: flex; justify-content: flex-end; gap: 8px; }
    .header-title { font-size: 18px; letter-spacing: 4px; color: var(--green); font-weight: bold; }
    .seq-badge { font-size: 12px; color: var(--muted); letter-spacing: 2px; font-weight: bold; }
    .seq-badge span { color: var(--green); }

    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .tab {
      flex: 1; padding: 12px; font-family: var(--font); font-size: 12px; letter-spacing: 2px;
      background: transparent; border: none; color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: bold;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    .panel { display: none; flex-direction: column; flex: 1; overflow-y: auto; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
    .panel.active { display: flex; }

    .stake-section { padding: 24px 16px; border-bottom: 1px solid var(--border); }
    .label { font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; font-weight: bold; }
    .stake-big { display: flex; align-items: baseline; gap: 10px; }
    .stake-num { font-size: 72px; font-weight: bold; color: var(--green); line-height: 1; text-shadow: 0 0 40px rgba(61,255,122,0.3); }
    .stake-unit { font-size: 20px; color: var(--muted); font-weight: bold; }
    .lv-info { font-size: 13px; letter-spacing: 3px; color: var(--muted); margin: 16px 0 10px; font-weight: bold; }

    .prog-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .prog-cell {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      font-size: 10px; border: 1px solid #1a3a25; color: #3a6a4a; font-weight: bold;
    }
    .prog-cell.past { border-color: #2a5a35; background: #0f2018; color: var(--muted); }
    .prog-cell.active { border: 2px solid var(--green); background: rgba(61,255,122,0.15); color: var(--green); }
    .prog-arrow { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: #3a6a4a; font-size: 14px; }

    .odds-section { padding: 18px 16px; border-bottom: 1px solid var(--border); position: relative; }
    .odds-input {
      width: 100%; background: #0a110d; border: 1px solid var(--border); color: var(--text);
      font-family: var(--font); font-size: 32px; padding: 12px 14px; outline: none;
      letter-spacing: 2px; border-radius: 0; -webkit-appearance: none;
    }
    .odds-input.valid { border-color: var(--green); color: var(--green); }
    .odds-preview {
      position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none; font-weight: bold;
    }

    .btn-row { padding: 18px 16px; display: flex; gap: 12px; }
    .btn {
      flex: 1; padding: 20px 10px; font-family: var(--font); font-size: 13px; letter-spacing: 3px;
      border: 1px solid var(--border); background: transparent; color: #3a6a4a;
      cursor: not-allowed; border-radius: 0; -webkit-appearance: none; font-weight: bold;
    }
    .btn.enabled-win { border-color: var(--green); color: var(--green); background: rgba(61,255,122,0.08); cursor: pointer; }
    .btn.enabled-loss { border-color: #cc3333; color: var(--red); background: rgba(255,80,80,0.05); cursor: pointer; }
    .btn:active { opacity: 0.7; }

    .pnl-section { padding: 18px 16px; margin-top: auto; border-top: 1px solid var(--border); }
    .pnl-num { font-size: 42px; font-weight: bold; line-height: 1; }
    .pnl-num.pos { color: var(--green); text-shadow: 0 0 25px rgba(61,255,122,0.25); }
    .pnl-num.neg { color: var(--red); text-shadow: 0 0 25px rgba(255,80,80,0.2); }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
    .stat-box { background: var(--bg2); border: 1px solid var(--border); padding: 14px; }
    .stat-label { font-size: 12px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; font-weight: bold; }
    .stat-value { font-size: 24px; font-weight: bold; line-height: 1; color: var(--green-mid); }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: bold; }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.orange { color: var(--orange); }
    .stat-value.neutral { color: var(--text); }

    .history-empty { display: flex; align-items: center; justify-content: center; height: 200px; color: #3a6a4a; font-size: 12px; letter-spacing: 4px; font-weight: bold; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; font-weight: 600; }
    .history-table th {
      padding: 10px; text-align: left; color: var(--muted); letter-spacing: 2px;
      font-size: 12px; font-weight: bold; position: sticky; top: 0;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .history-table td { padding: 10px; border-bottom: 1px solid #0e1a12; }
    .history-table tr:first-child td { background: rgba(61,255,122,0.03); }
    .td-id,.td-use { color: var(--muted); }
    .td-lv { color: var(--green-mid); }
    .td-stake,.td-odds { color: var(--text); }
    .td-win { color: var(--green); }
    .td-loss { color: var(--red); }
    .td-profit-pos { color: var(--green); }
    .td-profit-neg { color: var(--red); }
    .td-cum-pos { color: #4aaa6a; }
    .td-cum-neg { color: var(--red-dim); }

    .reset-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: var(--font); font-size: 11px; letter-spacing: 2px;
      padding: 7px 13px; cursor: pointer; font-weight: bold;
    }
    .reset-btn.confirm { border-color: var(--red); color: var(--red); }

    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #060a07; font-family: var(--font);
      font-size: 12px; letter-spacing: 2px; padding: 10px 18px; font-weight: bold;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-row1">
    <div class="header-title">PyrΔmida</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
      <div class="seq-badge">SEQ <span id="seq-pos">0</span></div>
      <div class="seq-badge">BK <span id="bankroll-display">100.00</span>u</div>
    </div>
  </div>
  <div class="header-row2">
    <button class="reset-btn" onclick="handleUndo()">UNDO</button>
    <button class="reset-btn" onclick="esportaJSON()">ESPORTA</button>
    <button class="reset-btn" onclick="document.getElementById('importFile').click()">IMPORTA</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importaJSON(event)">
    <button class="reset-btn" id="reset-btn" onclick="handleReset()">RESET</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('bet')">BET</button>
  <button class="tab" onclick="switchTab('stats')">STATS</button>
  <button class="tab" onclick="switchTab('history')">STORICO</button>
</div>

<!-- BET -->
<div id="panel-bet" class="panel active">
  <div class="stake-section">
    <div class="label">STAKE CORRENTE</div>
    <div class="stake-big">
      <div class="stake-num" id="stake-num">1</div>
      <div class="stake-unit">u</div>
    </div>
    <div class="lv-info" id="lv-info">LIVELLO 1 · 1/1</div>
    <div class="prog-grid" id="prog-grid"></div>
  </div>

  <div class="odds-section">
    <div class="label">QUOTA EVENTO</div>
    <input class="odds-input" id="odds-input" type="number" inputmode="decimal"
      step="0.01" min="1.01" placeholder="es. 2.40" oninput="onOddsChange()" />
    <div class="odds-preview" id="odds-preview"></div>
  </div>

  <div class="btn-row">
    <button class="btn" id="btn-win" onclick="handleResult(true)">▲ WIN</button>
    <button class="btn" id="btn-loss" onclick="handleResult(false)">▼ LOSS</button>
  </div>

  <div class="pnl-section">
    <div class="label">P&L NETTO</div>
    <div class="pnl-num pos" id="pnl-units">+0.00u</div>
  </div>
</div>

<!-- STATS -->
<div id="panel-stats" class="panel">
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-label">WIN RATE</div><div class="stat-value" id="s-winrate">—</div><div class="stat-sub" id="s-winrate-sub"></div></div>
    <div class="stat-box"><div class="stat-label">ROI</div><div class="stat-value" id="s-roi">—</div><div class="stat-sub" id="s-roi-sub"></div></div>
    <div class="stat-box"><div class="stat-label">QUOTA MEDIA</div><div class="stat-value neutral" id="s-avgodds">—</div><div class="stat-sub" id="s-avgodds-sub"></div></div>
    <div class="stat-box"><div class="stat-label">DD ATTUALE</div><div class="stat-value" id="s-ddcur">—</div><div class="stat-sub" id="s-ddcur-sub"></div></div>
    <div class="stat-box"><div class="stat-label">DD MASSIMO</div><div class="stat-value orange" id="s-ddmax">—</div><div class="stat-sub" id="s-ddmax-sub"></div></div>
    <div class="stat-box"><div class="stat-label">STRIKE LOSS</div><div class="stat-value" id="s-strike">—</div><div class="stat-sub" id="s-strike-sub"></div></div>
  </div>
</div>

<!-- HISTORY -->
<div id="panel-history" class="panel">
  <div id="history-empty" class="history-empty">NESSUN BET REGISTRATO</div>
  <table class="history-table" id="history-table" style="display:none">
    <thead><tr><th>#</th><th>LV</th><th>USO</th><th>STAKE</th><th>QUOTA</th><th>ESITO</th><th>P&L</th><th>CUM.</th><th>BK</th></tr></thead>
    <tbody id="history-body"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
  const BANKROLL_START = 100;
  let state = { flatPos: 0, netUnits: 0, history: [], bankroll: BANKROLL_START, peakBankroll: BANKROLL_START };
  let resetPending = false, resetTimer = null;

  function save() { try { localStorage.setItem('pyramida_v1', JSON.stringify(state)); } catch(e) {} }
  function load() { try { const r = localStorage.getItem('pyramida_v1'); if (r) { state = JSON.parse(r); if (state.bankroll === undefined) state.bankroll = BANKROLL_START; if (state.peakBankroll === undefined) state.peakBankroll = Math.max(BANKROLL_START, state.bankroll); } } catch(e) {} }

  function posToLevelUse(fp) {
    let level = 1, pos = fp;
    while (pos >= level) { pos -= level; level++; }
    return { level, useIndex: pos };
  }

  function render() {
    const { level, useIndex } = posToLevelUse(state.flatPos);

    document.getElementById('seq-pos').textContent = state.flatPos;
    document.getElementById('stake-num').textContent = level;
    document.getElementById('lv-info').textContent = `LIVELLO ${level} · ${useIndex + 1}/${level}`;

    const bk = document.getElementById('bankroll-display');
    bk.textContent = state.bankroll.toFixed(2);
    bk.style.color = state.bankroll >= BANKROLL_START ? 'var(--green)' : state.bankroll >= BANKROLL_START * 0.8 ? 'var(--orange)' : 'var(--red)';

    const grid = document.getElementById('prog-grid');
    grid.innerHTML = '';
    for (let l = 1; l <= Math.min(level + 1, 8); l++) {
      for (let u = 0; u < l; u++) {
        const c = document.createElement('div');
        const isActive = l === level && u === useIndex;
        const isPast = l < level || (l === level && u < useIndex);
        c.className = 'prog-cell' + (isActive ? ' active' : isPast ? ' past' : '');
        c.textContent = l;
        grid.appendChild(c);
      }
    }
    const arr = document.createElement('div');
    arr.className = 'prog-arrow'; arr.textContent = '→';
    grid.appendChild(arr);

    const net = state.netUnits;
    const pu = document.getElementById('pnl-units');
    pu.textContent = (net >= 0 ? '+' : '') + net.toFixed(2) + 'u';
    pu.className = 'pnl-num ' + (net >= 0 ? 'pos' : 'neg');

    onOddsChange();
    renderStats();
    renderHistory();
  }

  function onOddsChange() {
    const { level } = posToLevelUse(state.flatPos);
    const q = parseFloat(document.getElementById('odds-input').value);
    const valid = q > 1;
    document.getElementById('odds-input').classList.toggle('valid', valid);
    document.getElementById('odds-preview').textContent = valid ? '+' + (level * (q - 1)).toFixed(2) + 'u' : '';
    document.getElementById('btn-win').className = 'btn' + (valid ? ' enabled-win' : '');
    document.getElementById('btn-loss').className = 'btn' + (valid ? ' enabled-loss' : '');
  }

  function renderStats() {
    const h = state.history;
    if (!h.length) return;
    const rev = [...h].reverse();
    const wins = h.filter(x => x.won).length;
    const wr = (wins / h.length * 100).toFixed(1);
    const staked = h.reduce((s, x) => s + x.stake, 0);
    const roi = (h[0].cumulative / staked * 100).toFixed(1);
    const avgQ = (h.reduce((s, x) => s + x.odds, 0) / h.length).toFixed(2);

    let runPeak = 0, maxDd = 0;
    for (const x of rev) {
      if (x.cumulative > runPeak) runPeak = x.cumulative;
      maxDd = Math.max(maxDd, runPeak - x.cumulative);
    }
    let rPeak = 0;
    for (const x of rev) { if (x.cumulative > rPeak) rPeak = x.cumulative; }
    const curDd = Math.max(0, rPeak - h[0].cumulative);

    let strike = 0;
    for (const x of h) { if (!x.won) strike++; else break; }
    let maxS = 0, cur = 0;
    for (const x of rev) { if (!x.won) { cur++; maxS = Math.max(maxS, cur); } else cur = 0; }

    const set = (id, val, cls, sub) => {
      const el = document.getElementById(id);
      el.textContent = val;
      if (cls) el.className = 'stat-value ' + cls;
      if (sub !== undefined) document.getElementById(id + '-sub').textContent = sub;
    };

    set('s-winrate', wr + '%', parseFloat(wr) >= 50 ? 'green' : 'red', `${wins}W / ${h.length - wins}L`);
    set('s-roi', (parseFloat(roi) >= 0 ? '+' : '') + roi + '%', parseFloat(roi) >= 0 ? 'green' : 'red', `${staked}u investite`);
    set('s-avgodds', avgQ, 'neutral', `${h.length} bet totali`);
    set('s-ddcur', '-' + curDd.toFixed(2) + 'u', curDd > 0 ? 'red' : 'green', curDd > 0 ? `da picco` : 'nessun DD');
    set('s-ddmax', '-' + maxDd.toFixed(2) + 'u', 'orange', 'storico');
    set('s-strike', strike, strike >= 5 ? 'red' : strike >= 3 ? 'orange' : 'green', `max: ${maxS}`);
  }

  function renderHistory() {
    const h = state.history;
    document.getElementById('history-empty').style.display = h.length ? 'none' : 'flex';
    const table = document.getElementById('history-table');
    table.style.display = h.length ? 'table' : 'none';
    if (!h.length) return;
    document.getElementById('history-body').innerHTML = h.map(x => `
      <tr>
        <td class="td-id">${x.id}</td>
        <td class="td-lv">${x.level}</td>
        <td class="td-use">${x.use}/${x.level}</td>
        <td class="td-stake">${x.stake}u</td>
        <td class="td-odds">${x.odds.toFixed(2)}</td>
        <td class="${x.won ? 'td-win' : 'td-loss'}">${x.won ? 'WIN' : 'LOSS'}</td>
        <td class="${x.profit >= 0 ? 'td-profit-pos' : 'td-profit-neg'}">${x.profit >= 0 ? '+' : ''}${x.profit.toFixed(2)}</td>
        <td class="${x.cumulative >= 0 ? 'td-cum-pos' : 'td-cum-neg'}">${x.cumulative >= 0 ? '+' : ''}${x.cumulative.toFixed(2)}</td>
        <td class="${(x.bankroll ?? BANKROLL_START + x.cumulative) >= BANKROLL_START ? 'td-cum-pos' : 'td-cum-neg'}">${(x.bankroll ?? BANKROLL_START + x.cumulative).toFixed(2)}</td>
      </tr>`).join('');
  }

  function handleResult(won) {
    const q = parseFloat(document.getElementById('odds-input').value);
    if (!q || q <= 1) return;
    const { level, useIndex } = posToLevelUse(state.flatPos);
    const profit = won ? level * (q - 1) : -level;
    const newNet = state.netUnits + profit;
    const newBankroll = state.bankroll + profit;

    // Controlla se è un nuovo massimo
    const isNewPeak = newBankroll > state.peakBankroll;
    if (isNewPeak) state.peakBankroll = newBankroll;

    // Aggiorna flatPos: reset a 0 se nuovo massimo, altrimenti logica normale
    const newFlatPos = isNewPeak ? 0 : (won ? Math.max(0, state.flatPos - 1) : state.flatPos + 1);

    state.history.unshift({
      id: state.history.length + 1,
      level, use: useIndex + 1, stake: level,
      odds: q, won, profit, cumulative: newNet,
      bankroll: newBankroll,
      newPeak: isNewPeak
    });
    state.netUnits = newNet;
    state.bankroll = newBankroll;
    state.flatPos = newFlatPos;
    document.getElementById('odds-input').value = '';
    save(); render();
    const msg = won ? `WIN +${profit.toFixed(2)}u` : `LOSS -${Math.abs(profit).toFixed(2)}u`;
    showToast(isNewPeak ? `🔺 NUOVO MASSIMO! ${msg}` : msg);
  }

  function handleUndo() {
    if (!state.history.length) { showToast('NIENTE DA ANNULLARE'); return; }
    const last = state.history[0];
    state.history.shift();
    state.netUnits -= last.profit;
    state.bankroll -= last.profit;
    // Se il bet annullato aveva creato un nuovo picco, ricalcola il picco dallo storico
    if (last.newPeak) {
      state.peakBankroll = state.history.length
        ? Math.max(BANKROLL_START, ...state.history.map(x => x.bankroll))
        : BANKROLL_START;
    }
    // Ripristina flatPos: se era nuovo picco tornava a 0, quindi torniamo alla pos precedente
    if (last.newPeak) {
      // la pos prima del bet era quella corrente (che era flatPos prima del reset)
      // non abbiamo salvato il flatPos precedente, quindi lo ricalcoliamo dallo storico
      state.flatPos = last.won ? state.flatPos + 1 : Math.max(0, state.flatPos - 1);
    } else {
      state.flatPos = last.won ? state.flatPos + 1 : Math.max(0, state.flatPos - 1);
    }
    document.getElementById('odds-input').value = '';
    save(); render();
    showToast('ULTIMO BET ANNULLATO');
  }

  function handleReset() {
    const btn = document.getElementById('reset-btn');
    if (!resetPending) {
      resetPending = true;
      btn.textContent = 'SICURO?';
      btn.classList.add('confirm');
      resetTimer = setTimeout(() => {
        resetPending = false;
        btn.textContent = 'RESET';
        btn.classList.remove('confirm');
      }, 3000);
    } else {
      clearTimeout(resetTimer);
      resetPending = false;
      btn.textContent = 'RESET';
      btn.classList.remove('confirm');
      state = { flatPos: 0, netUnits: 0, history: [], bankroll: BANKROLL_START, peakBankroll: BANKROLL_START };
      document.getElementById('odds-input').value = '';
      save(); render();
      showToast('RESET ESEGUITO');
    }
  }

  function switchTab(name) {
    ['bet','stats','history'].forEach((n, i) => {
      document.querySelectorAll('.tab')[i].classList.toggle('active', n === name);
      document.getElementById('panel-' + n).classList.toggle('active', n === name);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function esportaJSON() {
    if (!state.history.length) { showToast('NESSUN DATO DA ESPORTARE'); return; }
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pyramida-archivio.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('ARCHIVIO ESPORTATO');
  }

  function importaJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (typeof data.flatPos === 'undefined' || !Array.isArray(data.history)) throw new Error();
        state = data;
        document.getElementById('odds-input').value = '';
        save(); render();
        showToast('ARCHIVIO IMPORTATO');
      } catch {
        showToast('FILE NON VALIDO');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  load(); render();
</script>

</body>
</html>
